<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Browser</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/register-sw.js" defer></script>
</head>
<body>
  <div id="app">
    <!-- LANDING PAGE -->
    <div id="landing">
      <div class="hero">
        <h1>Proxy Browser</h1>
        <p>Browse any website. All traffic is encrypted and routed through this server.</p>
      </div>

      <div class="search-container">
        <div class="search-box">
          <input
            type="text"
            id="urlInput"
            placeholder="Enter URL or search (e.g., youtube.com)"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="goBtn" onclick="go()">Go</button>
        </div>
      </div>

      <div class="shortcuts">
        <div class="shortcut" onclick="quickGo('https://www.google.com')">
          <span class="shortcut-icon">G</span>
          <span>Google</span>
        </div>
        <div class="shortcut" onclick="quickGo('https://www.youtube.com')">
          <span class="shortcut-icon">YT</span>
          <span>YouTube</span>
        </div>
        <div class="shortcut" onclick="quickGo('https://discord.com/app')">
          <span class="shortcut-icon">DC</span>
          <span>Discord</span>
        </div>
        <div class="shortcut" onclick="quickGo('https://github.com')">
          <span class="shortcut-icon">GH</span>
          <span>GitHub</span>
        </div>
        <div class="shortcut" onclick="quickGo('https://www.wikipedia.org')">
          <span class="shortcut-icon">W</span>
          <span>Wikipedia</span>
        </div>
        <div class="shortcut" onclick="quickGo('https://reddit.com')">
          <span class="shortcut-icon">R</span>
          <span>Reddit</span>
        </div>
      </div>

      <p class="note">
        First load takes a few seconds while the service worker initializes.
      </p>
    </div>

    <!-- BROWSER VIEW -->
    <div id="browser" style="display:none">
      <div class="toolbar">
        <button class="nav-btn" onclick="navBack()" title="Back">&larr;</button>
        <button class="nav-btn" onclick="navForward()" title="Forward">&rarr;</button>
        <button class="nav-btn" onclick="navReload()" title="Reload">&#8635;</button>
        <button class="nav-btn" onclick="navHome()" title="Home">H</button>

        <div class="url-bar">
          <input
            type="text"
            id="urlInputBar"
            placeholder="Enter URL..."
            onkeydown="if(event.key==='Enter') goFromBar()"
            autocomplete="off"
            spellcheck="false"
          />
          <button onclick="goFromBar()">Go</button>
        </div>
      </div>

      <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script>
    const landing = document.getElementById("landing");
    const browser = document.getElementById("browser");
    const urlInput = document.getElementById("urlInput");
    const urlInputBar = document.getElementById("urlInputBar");
    const frame = document.getElementById("proxyFrame");

    function navigateTo(url) {
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        if (url.includes(".") && !url.includes(" ")) {
          url = "https://" + url;
        } else {
          url = "https://www.google.com/search?q=" + encodeURIComponent(url);
        }
      }

      if (!navigator.serviceWorker.controller) {
        alert("Service worker is still loading. Please wait a few seconds and try again.");
        return;
      }

      const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);

      landing.style.display = "none";
      browser.style.display = "flex";
      urlInputBar.value = url;

      frame.src = encodedUrl;
    }

    function go() { navigateTo(urlInput.value.trim()); }
    function quickGo(url) { navigateTo(url); }
    function goFromBar() { navigateTo(urlInputBar.value.trim()); }

    function navBack() { frame.contentWindow.history.back(); }
    function navForward() { frame.contentWindow.history.forward(); }
    function navReload() { frame.contentWindow.location.reload(); }
    function navHome() {
      landing.style.display = "flex";
      browser.style.display = "none";
      frame.src = "about:blank";
    }

    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") go();
    });

    const script = document.createElement("script");
    script.src = "/uv/uv.config.js";
    document.head.appendChild(script);
  </script>
</body>
</html>
